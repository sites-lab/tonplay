<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TonPlay Support</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F0F4FF;--surf:#FFFFFF;--card2:#F7F9FF;
  --ton:#2196F3;--ton2:#1565C0;--ton-light:#E3F0FF;
  --green:#10B981;--green-light:#D1FAE5;
  --red:#EF4444;--red-light:#FEE2E2;
  --text:#0F172A;--sub:#64748B;--muted:#94A3B8;--border:#E2E8F0;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);
  --r:16px;
}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden;-webkit-tap-highlight-color:transparent;}

.app{position:fixed;inset:0;display:flex;flex-direction:column;overflow:hidden;}

/* Header */
.header{padding:12px 16px;display:flex;align-items:center;gap:10px;background:var(--surf);border-bottom:1px solid var(--border);box-shadow:var(--shadow);flex-shrink:0;}
.logo-icon{width:38px;height:38px;background:linear-gradient(135deg,#2196F3,#1565C0);border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(33,150,243,0.3);flex-shrink:0;}
.logo-icon svg{width:20px;height:20px;}
.header-text{}
.header-title{font-size:16px;font-weight:900;letter-spacing:-0.3px;}
.header-title span{color:var(--ton);}
.header-sub{font-size:10px;color:var(--sub);margin-top:1px;}

/* Chat area */
.chat-wrap{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:12px;}
.chat-wrap::-webkit-scrollbar{width:3px;}
.chat-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* Messages */
.msg-row{display:flex;margin-bottom:10px;gap:8px;}
.msg-row.outgoing{flex-direction:row-reverse;}
.msg-avatar{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;margin-top:2px;}
.msg-avatar.support{background:linear-gradient(135deg,#2196F3,#1565C0);color:#fff;font-size:12px;font-weight:800;}
.msg-avatar.user{background:var(--ton-light);color:var(--ton);font-size:13px;}
.msg-bubble{max-width:78%;padding:9px 12px;border-radius:16px;font-size:13px;line-height:1.45;position:relative;word-break:break-word;}
.msg-bubble.support{background:var(--surf);border:1px solid var(--border);border-top-left-radius:4px;box-shadow:var(--shadow);}
.msg-bubble.user{background:linear-gradient(135deg,var(--ton),var(--ton2));color:#fff;border-top-right-radius:4px;box-shadow:0 2px 8px rgba(33,150,243,0.25);}
.msg-bubble.user .msg-time{color:rgba(255,255,255,0.65);}
.msg-time{font-size:9px;color:var(--muted);margin-top:4px;text-align:right;}
.msg-sender{font-size:9px;font-weight:800;color:var(--ton);margin-bottom:3px;letter-spacing:.3px;}

/* Typing indicator */
.typing-row{display:flex;gap:8px;margin-bottom:10px;align-items:center;}
.typing-bubble{background:var(--surf);border:1px solid var(--border);border-radius:16px;border-top-left-radius:4px;padding:10px 14px;display:flex;gap:4px;align-items:center;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:bounce .9s infinite;}
.dot:nth-child(2){animation-delay:.15s;}
.dot:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}

/* Empty state */
.empty-chat{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:30px;text-align:center;}
.empty-icon{width:64px;height:64px;background:var(--ton-light);border-radius:20px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;font-size:28px;}
.empty-title{font-size:16px;font-weight:800;margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--sub);line-height:1.6;max-width:240px;}

/* Input area */
.input-area{padding:10px 12px;background:var(--surf);border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:8px;align-items:flex-end;}
.input-wrap{flex:1;background:var(--card2);border:1.5px solid var(--border);border-radius:20px;padding:9px 14px;transition:border-color .2s;}
.input-wrap:focus-within{border-color:var(--ton);}
textarea#msg-input{width:100%;background:transparent;border:none;outline:none;resize:none;font-family:'Inter',sans-serif;font-size:13px;color:var(--text);min-height:20px;max-height:100px;line-height:1.4;display:block;}
textarea#msg-input::placeholder{color:var(--muted);}
.send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--ton),var(--ton2));border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 3px 10px rgba(33,150,243,0.3);transition:all .15s;-webkit-tap-highlight-color:transparent;}
.send-btn:active{transform:scale(0.92);}
.send-btn svg{width:18px;height:18px;}
.send-btn:disabled{opacity:0.4;cursor:not-allowed;}

/* Category chips */
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.cat-chip{padding:5px 12px;border-radius:20px;background:var(--surf);border:1.5px solid var(--border);font-size:11px;font-weight:700;color:var(--sub);cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.cat-chip.active{background:var(--ton-light);border-color:rgba(33,150,243,0.4);color:var(--ton);}

/* Status bar */
.status-bar{padding:5px 14px;font-size:10px;font-weight:600;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 2px var(--green-light);flex-shrink:0;}
.status-dot.offline{background:var(--muted);box-shadow:none;}

/* Closed banner */
.closed-banner{margin:12px;padding:12px 14px;background:var(--ton-light);border:1.5px solid rgba(33,150,243,0.25);border-radius:14px;font-size:12px;color:var(--ton2);line-height:1.6;text-align:center;}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;pointer-events:none;transition:all .25s;white-space:nowrap;z-index:999;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo-icon"><svg viewBox="0 0 24 24" fill="white"><path d="M12 2L4 6v6c0 5.25 3.5 10.15 8 11.5C16.5 22.15 20 17.25 20 12V6L12 2z"/></svg></div>
    <div class="header-text">
      <div class="header-title">Ton<span>Play</span> Support</div>
      <div class="header-sub" id="header-sub">Loading…</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>

  <div class="chat-wrap" id="chat-wrap">
    <div class="empty-chat" id="empty-chat">
      <div class="empty-icon">💬</div>
      <div class="empty-title">How can we help?</div>
      <div class="empty-sub" id="empty-sub">Pick a topic or type your question below. Our support team will reply shortly.</div>
    </div>
  </div>

  <div style="padding:0 12px 0;" id="cats-row">
    <div class="cats" id="cats">
      <div class="cat-chip active" onclick="selectCat(this,'General')">💬 General</div>
      <div class="cat-chip" onclick="selectCat(this,'Deposit')">💰 Deposit</div>
      <div class="cat-chip" onclick="selectCat(this,'Withdrawal')">💸 Withdrawal</div>
      <div class="cat-chip" onclick="selectCat(this,'Referral')">👥 Referral</div>
      <div class="cat-chip" onclick="selectCat(this,'Other')">❓ Other</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="msg-input" placeholder="Write your message…" rows="1" oninput="autoResize(this)"></textarea>
    </div>
    <button class="send-btn" id="send-btn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPPORT_BOT_TOKEN = '8512101964:AAEGRe9tsb-6NOuXYpE1DJe0l6zHVvY1bqs';
const ADMIN_CHAT_ID     = '8671373607';
const FIRESTORE_URL     = 'https://firestore.googleapis.com/v1/projects/miniapp-ton/databases/(default)/documents';
const FIREBASE_API_KEY  = 'AIzaSyAml8c0QPKlbEmXG7C4eXd-WYbbOvOHtP8';

let tgUser = null;
let selectedCat = 'General';
let messages = [];
let pollTimer = null;
let lastPollTime = null;
let lang = 'en';

// ── Init ──
window.addEventListener('DOMContentLoaded', async () => {
  const tg = window.Telegram?.WebApp;
  if (tg) { tg.expand(); tg.ready(); }

  tgUser = tg?.initDataUnsafe?.user || null;
  lang = tgUser?.language_code === 'ru' ? 'ru' : 'en';

  if (lang === 'ru') {
    document.querySelector('.empty-title').textContent  = 'Чем можем помочь?';
    document.querySelector('#empty-sub').textContent    = 'Выберите тему или напишите вопрос. Поддержка ответит вам в ближайшее время.';
    document.querySelector('#msg-input').placeholder    = 'Напишите сообщение…';
    document.querySelectorAll('.cat-chip').forEach((c,i)=>{
      const labels=['💬 Общее','💰 Депозит','💸 Вывод','👥 Рефералы','❓ Другое'];
      c.textContent = labels[i];
    });
  }

  document.getElementById('header-sub').textContent = tgUser
    ? (lang==='ru' ? `Привет, ${tgUser.first_name}!` : `Hi, ${tgUser.first_name}!`)
    : (lang==='ru' ? 'Поддержка TonPlay' : 'TonPlay Support');

  setStatus(true);
  await loadHistory();
  startPolling();

  document.getElementById('msg-input').addEventListener('input', () => {
    document.getElementById('send-btn').disabled = !document.getElementById('msg-input').value.trim();
  });
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
});

function setStatus(online) {
  document.getElementById('status-dot').className = 'status-dot' + (online ? '' : ' offline');
  document.getElementById('status-text').textContent = online
    ? (lang==='ru' ? '● Онлайн — поддержка активна' : '● Online — support is active')
    : (lang==='ru' ? '○ Оффлайн' : '○ Offline');
}

function selectCat(el, cat) {
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedCat = cat;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function timeStr() {
  return new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

function addMessage(text, type, time) {
  const wrap = document.getElementById('chat-wrap');
  const empty = document.getElementById('empty-chat');
  if (empty) empty.remove();

  const row = document.createElement('div');
  row.className = `msg-row ${type === 'user' ? 'outgoing' : ''}`;

  const avatar = document.createElement('div');
  avatar.className = `msg-avatar ${type}`;
  avatar.textContent = type === 'support' ? '🛡️' : (tgUser?.first_name?.[0] || '👤');

  const bubble = document.createElement('div');
  bubble.className = `msg-bubble ${type}`;
  if (type === 'support') {
    const sender = document.createElement('div');
    sender.className = 'msg-sender';
    sender.textContent = lang==='ru' ? 'ПОДДЕРЖКА' : 'SUPPORT';
    bubble.appendChild(sender);
  }
  const textNode = document.createElement('div');
  textNode.textContent = text;
  bubble.appendChild(textNode);
  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = time || timeStr();
  bubble.appendChild(timeEl);

  row.appendChild(avatar);
  row.appendChild(bubble);
  wrap.appendChild(row);
  wrap.scrollTop = wrap.scrollHeight;
}

function showTyping() {
  removeTyping();
  const wrap = document.getElementById('chat-wrap');
  const row = document.createElement('div');
  row.className = 'typing-row'; row.id = 'typing-row';
  row.innerHTML = `<div class="msg-avatar support">🛡️</div><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  wrap.appendChild(row);
  wrap.scrollTop = wrap.scrollHeight;
}
function removeTyping() {
  document.getElementById('typing-row')?.remove();
}

// ── Firestore helpers (REST) ──
async function firestoreGet(path) {
  const r = await fetch(`${FIRESTORE_URL}/${path}?key=${FIREBASE_API_KEY}`);
  return r.ok ? r.json() : null;
}
async function firestoreAdd(collection, data) {
  const body = { fields: firestoreEncode(data) };
  const r = await fetch(`${FIRESTORE_URL}/${collection}?key=${FIREBASE_API_KEY}`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  return r.ok ? r.json() : null;
}
async function firestoreQuery(collection, field, value) {
  const body = {
    structuredQuery: {
      from: [{collectionId: collection}],
      where: { fieldFilter: { field: {fieldPath: field}, op: 'EQUAL', value: {stringValue: String(value)} }},
      orderBy: [{field: {fieldPath: 'createdAt'}, direction: 'ASCENDING'}],
      limit: 50
    }
  };
  const r = await fetch(`${FIRESTORE_URL.replace('/documents','')}/documents:runQuery?key=${FIREBASE_API_KEY}`, {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body)
  });
  return r.ok ? r.json() : [];
}

function firestoreEncode(obj) {
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    if (typeof v === 'string')  out[k] = {stringValue: v};
    else if (typeof v === 'number') out[k] = {doubleValue: v};
    else if (typeof v === 'boolean') out[k] = {booleanValue: v};
    else if (v === null) out[k] = {nullValue: null};
    else if (v instanceof Date) out[k] = {timestampValue: v.toISOString()};
  }
  return out;
}
function firestoreDecode(fields) {
  const out = {};
  for (const [k, v] of Object.entries(fields || {})) {
    out[k] = v.stringValue ?? v.doubleValue ?? v.integerValue ?? v.booleanValue ?? v.timestampValue ?? null;
  }
  return out;
}

// ── Load history from Firestore ──
async function loadHistory() {
  if (!tgUser?.id) return;
  try {
    const results = await firestoreQuery('supportMessages', 'userId', String(tgUser.id));
    for (const r of results) {
      if (!r.document) continue;
      const d = firestoreDecode(r.document.fields);
      const t = d.createdAt ? new Date(d.createdAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
      addMessage(d.text, d.direction === 'inbound' ? 'user' : 'support', t);
      messages.push(d);
    }
    lastPollTime = new Date().toISOString();
  } catch(e) {}
}

// ── Poll for new replies from admin ──
function startPolling() {
  pollTimer = setInterval(async () => {
    if (!tgUser?.id || !lastPollTime) return;
    try {
      // Query support messages for this user newer than lastPollTime
      const body = {
        structuredQuery: {
          from: [{collectionId: 'supportMessages'}],
          where: {
            compositeFilter: {
              op: 'AND',
              filters: [
                { fieldFilter: { field: {fieldPath:'userId'}, op:'EQUAL', value:{stringValue:String(tgUser.id)} }},
                { fieldFilter: { field: {fieldPath:'direction'}, op:'EQUAL', value:{stringValue:'outbound'} }},
                { fieldFilter: { field: {fieldPath:'createdAt'}, op:'GREATER_THAN', value:{timestampValue: lastPollTime} }}
              ]
            }
          },
          orderBy: [{field:{fieldPath:'createdAt'}, direction:'ASCENDING'}]
        }
      };
      const r = await fetch(`${FIRESTORE_URL.replace('/documents','')}/documents:runQuery?key=${FIREBASE_API_KEY}`, {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
      });
      const results = await r.json();
      for (const res of results) {
        if (!res.document) continue;
        const d = firestoreDecode(res.document.fields);
        removeTyping();
        addMessage(d.text, 'support');
        lastPollTime = d.createdAt || new Date().toISOString();
        showToast(lang==='ru' ? '💬 Ответ от поддержки!' : '💬 Reply from support!');
      }
    } catch(e) {}
  }, 4000);
}

// ── Greeting auto-reply ──
const EN_GREETING_PATTERNS = /^(hi|hello|hey|hiya|yo|sup|howdy|greetings)[!?.,\s]*$/i;
const RU_GREETING_PATTERNS = /^(привет|хай|хэй|здравствуй|здравствуйте|добрый день|добрый вечер|добро пожаловать|доброе утро|ку|салам|здорово|здрасте|здрастуйте|хелло|приветик|приветствую)[!?.,\s]*$/i;

function isEnGreeting(text) { return EN_GREETING_PATTERNS.test(text.trim()); }
function isRuGreeting(text) { return RU_GREETING_PATTERNS.test(text.trim()); }

// Track if we've already sent the RU greeting auto-reply this session
let ruGreetingReplied = false;

async function sendAutoReply(userLang) {
  // Show typing for 10 seconds, then auto-reply
  showTyping();
  await new Promise(r => setTimeout(r, 10000));
  removeTyping();
  const reply = userLang === 'ru'
    ? '👋 Привет! Напишите, в чём ваша проблема, и мы ответим в ближайшее время.'
    : '👋 Hi there! How can I help you? Please describe your issue and our support team will get back to you shortly.';
  addMessage(reply, 'support');
  // Save the auto-reply to Firestore so it shows in admin panel
  const userId = String(tgUser?.id || 'anonymous');
  await firestoreAdd('supportMessages', {
    userId,
    userName: '',
    displayName: 'Support Bot',
    text: reply,
    direction: 'outbound',
    repliedBy: 'autobot',
    createdAt: new Date().toISOString(),
    lang: userLang
  });
}

// ── Send message ──
async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  const userId   = String(tgUser?.id || 'anonymous');
  const userName = tgUser?.username ? '@' + tgUser.username : (tgUser?.first_name || 'Unknown');
  const displayName = tgUser ? `${tgUser.first_name || ''}${tgUser.last_name ? ' '+tgUser.last_name : ''}`.trim() : 'Unknown';

  addMessage(text, 'user');

  // Save to Firestore
  const msgData = {
    userId,
    userName: tgUser?.username || '',
    displayName,
    text,
    category: selectedCat,
    direction: 'inbound',
    createdAt: new Date().toISOString(),
    lang
  };
  await firestoreAdd('supportMessages', msgData);

  lastPollTime = new Date().toISOString();

  // ── English greeting auto-reply (no admin notification) ──
  if (isEnGreeting(text)) {
    sendAutoReply('en'); // fire-and-forget (10s delay inside)
    return;
  }

  // ── Russian greeting auto-reply — only ONE time, then forward to admin ──
  if (isRuGreeting(text)) {
    if (!ruGreetingReplied) {
      ruGreetingReplied = true;
      sendAutoReply('ru'); // fire-and-forget (10s delay inside)
      return;
    }
    // Second+ Russian greeting → fall through to admin notification below
  }

  // ── Forward to admin Telegram bot with deep-link to open thread ──
  const adminPanelUrl = 'https://tonplay.surge.sh/admin.html';
  const header =
    `💬 <b>${lang==='ru'?'Новое сообщение от пользователя':'New User Message'}</b>\n` +
    `👤 ${displayName} (${userName})\n` +
    `🆔 <code>${userId}</code>\n` +
    `🏷️ Category: <b>${selectedCat}</b>\n` +
    `🌐 Lang: ${lang === 'ru' ? '🇷🇺 RU' : '🇬🇧 EN'}\n` +
    `─────────────────\n` +
    text;

  const replyMarkup = {
    inline_keyboard: [
      [{ text: '↩️ Reply in bot', callback_data: `supp_reply_${userId}|${userName}` }],
      [{ text: '🖥️ Open Admin Panel', url: adminPanelUrl }]
    ]
  };

  try {
    await fetch(`https://api.telegram.org/bot${SUPPORT_BOT_TOKEN}/sendMessage`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ chat_id: ADMIN_CHAT_ID, text: header, parse_mode:'HTML', reply_markup: replyMarkup })
    });
  } catch(e) {}

  showTyping();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}
</script>
</body>
</html>
